<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SNAKE — neon terminal</title>
  <meta name="theme-color" content="#060608" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--neon:#00ffb2;--red:#ff3c78;--bg:#060608;--dim:rgba(0,255,178,0.45);--border:rgba(0,255,178,0.15)}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--neon);font-family:'Share Tech Mono','Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;user-select:none;-webkit-user-select:none}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:100}
    header{width:100%;max-width:520px;padding:16px 20px 0;display:flex;align-items:baseline;justify-content:space-between}
    .logo{font-family:'Teko',sans-serif;font-weight:700;font-size:clamp(2rem,7vw,3rem);letter-spacing:.14em;text-transform:uppercase;color:var(--neon);text-shadow:0 0 20px var(--neon),0 0 40px rgba(0,255,178,.3);line-height:1}
    .logo span{color:var(--red);text-shadow:0 0 20px var(--red)}
    .version{font-size:.6rem;color:var(--dim);letter-spacing:.15em}
    .stats{width:100%;max-width:520px;padding:8px 20px;display:flex;gap:24px}
    .stat{display:flex;flex-direction:column;gap:1px}
    .stat-label{font-size:.52rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
    .stat-value{font-family:'Teko',sans-serif;font-size:1.6rem;font-weight:700;line-height:1;color:var(--neon)}
    .stat-value.red{color:var(--red);text-shadow:0 0 8px var(--red)}
    .game-wrap{position:relative;margin:8px 0 0;border:1px solid var(--border);box-shadow:0 0 30px rgba(0,255,178,.06),inset 0 0 40px rgba(0,0,0,.5)}
    #gameCanvas{display:block;image-rendering:pixelated}
    #gameCanvas.pulse{box-shadow:0 0 0 2px var(--neon),0 0 20px rgba(0,255,178,.4)}
    .corner{position:absolute;width:12px;height:12px;border-color:var(--neon);border-style:solid;opacity:.5}
    .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
    .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
    .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
    .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,8,.88);backdrop-filter:blur(2px);cursor:pointer;gap:10px}
    #overlay.hidden{display:none}
    #overlayMsg{font-family:'Teko',sans-serif;font-size:clamp(2.8rem,11vw,5rem);font-weight:700;letter-spacing:.18em;color:var(--neon);text-shadow:0 0 30px var(--neon),0 0 60px rgba(0,255,178,.25);line-height:1}
    #overlaySub{font-size:clamp(.6rem,2.5vw,.75rem);color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
    footer{width:100%;max-width:520px;padding:8px 20px;display:flex;gap:12px;flex-wrap:wrap}
    .hint{display:flex;align-items:center;gap:5px;font-size:.56rem;letter-spacing:.1em;color:rgba(0,255,178,.3);text-transform:uppercase}
    .key{padding:2px 5px;border:1px solid rgba(0,255,178,.2);border-radius:3px;background:rgba(0,255,178,.04);font-size:.58rem;color:rgba(0,255,178,.5)}
  </style>
</head>
<body>
  <header>
    <div class="logo">SN<span>A</span>KE</div>
    <div class="version">v1.0 · NEON TERMINAL</div>
  </header>
  <div class="stats">
    <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="scoreVal">0</span></div>
    <div class="stat"><span class="stat-label">Best</span><span class="stat-value red" id="hiVal">0</span></div>
    <div class="stat"><span class="stat-label">Level</span><span class="stat-value" id="lvlVal">1</span></div>
  </div>
  <div class="game-wrap">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <div id="overlayMsg">SNAKE</div>
      <div id="overlaySub">Press SPACE or tap to start</div>
    </div>
  </div>
  <footer>
    <div class="hint"><span class="key">↑↓←→</span>&nbsp;move</div>
    <div class="hint"><span class="key">WASD</span>&nbsp;move</div>
    <div class="hint"><span class="key">P</span>&nbsp;pause</div>
    <div class="hint"><span class="key">SPACE</span>&nbsp;start/retry</div>
    <div class="hint"><span class="key">SWIPE</span>&nbsp;mobile</div>
  </footer>
  <script>
    const GRID=20,TICK_BASE=130;
    const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
    const overlay=document.getElementById('overlay'),msgEl=document.getElementById('overlayMsg');
    const subEl=document.getElementById('overlaySub'),scoreEl=document.getElementById('scoreVal');
    const hiEl=document.getElementById('hiVal'),lvlEl=document.getElementById('lvlVal');
    let snake,dir,nextDir,food,score,hiScore,level,loop,running,paused;
    hiScore=parseInt(localStorage.getItem('snakeHi')||'0');hiEl.textContent=hiScore;
    function resize(){const s=Math.min(window.innerWidth*.94,window.innerHeight*.68,480);const c=Math.floor(s/GRID)*GRID;canvas.width=c;canvas.height=c}
    resize();window.addEventListener('resize',()=>{resize();if(!running)draw()});
    const cols=()=>canvas.width/GRID,rows=()=>canvas.height/GRID,rand=n=>Math.floor(Math.random()*n);
    function spawnFood(){let p;do{p={x:rand(cols()),y:rand(rows())}}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p}
    function init(){const cx=Math.floor(cols()/2),cy=Math.floor(rows()/2);snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;level=1;scoreEl.textContent=0;lvlEl.textContent=1;spawnFood()}
    function restartLoop(){clearInterval(loop);loop=setInterval(tick,Math.max(55,TICK_BASE-(level-1)*8))}
    function tick(){dir={...nextDir};const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.x>=cols()||h.y<0||h.y>=rows())return gameOver();if(snake.some(s=>s.x===h.x&&s.y===h.y))return gameOver();snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;scoreEl.textContent=score;if(score>hiScore){hiScore=score;hiEl.textContent=hiScore;localStorage.setItem('snakeHi',hiScore)}level=Math.floor(score/5)+1;lvlEl.textContent=level;spawnFood();canvas.classList.add('pulse');setTimeout(()=>canvas.classList.remove('pulse'),120);restartLoop()}else{snake.pop()}draw()}
    function draw(){const W=canvas.width,H=canvas.height;ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,255,180,.05)';for(let x=0;x<cols();x++)for(let y=0;y<rows();y++)ctx.fillRect(x*GRID+GRID/2-1,y*GRID+GRID/2-1,2,2);const fx=food.x*GRID+GRID/2,fy=food.y*GRID+GRID/2,p=3+Math.sin(Date.now()/350)*1.5;const gr=ctx.createRadialGradient(fx,fy,0,fx,fy,p*2.8);gr.addColorStop(0,'rgba(255,60,120,1)');gr.addColorStop(.5,'rgba(255,20,80,.5)');gr.addColorStop(1,'rgba(255,0,60,0)');ctx.beginPath();ctx.arc(fx,fy,p*2.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.beginPath();ctx.arc(fx,fy,p,0,Math.PI*2);ctx.fillStyle='#ff3c78';ctx.shadowColor='#ff3c78';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;snake.forEach((seg,i)=>{const pr=1-(i/snake.length)*.75,x=seg.x*GRID,y=seg.y*GRID,pad=2,sz=GRID-pad*2,r=i===0?5:3;if(i===0){ctx.shadowColor='#00ffb2';ctx.shadowBlur=18}const a=Math.floor(pr*255).toString(16).padStart(2,'0');ctx.fillStyle=i===0?'#00ffb2':`#00d496${a}`;rr(x+pad,y+pad,sz,sz,r);ctx.fill();ctx.shadowBlur=0;if(i===0){ctx.fillStyle='rgba(255,255,255,.22)';rr(x+pad+3,y+pad+3,sz/3,sz/3,2);ctx.fill()}})}
    function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
    let af;function foodAnim(){if(!running||paused)return;draw();af=requestAnimationFrame(foodAnim)}
    function startGame(){clearInterval(loop);cancelAnimationFrame(af);init();running=true;paused=false;overlay.classList.add('hidden');restartLoop();foodAnim()}
    function gameOver(){clearInterval(loop);cancelAnimationFrame(af);running=false;draw();setTimeout(()=>{msgEl.textContent='GAME OVER';subEl.textContent=`Score: ${score} — Press SPACE or tap to retry`;overlay.classList.remove('hidden')},200)}
    function pauseGame(){if(!running)return;paused=!paused;if(paused){clearInterval(loop);cancelAnimationFrame(af);msgEl.textContent='PAUSED';subEl.textContent='Press P or tap to continue';overlay.classList.remove('hidden')}else{overlay.classList.add('hidden');restartLoop();foodAnim()}}
    const DM={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){if(!running||!overlay.classList.contains('hidden'))return startGame()}if(e.key==='p'||e.key==='P')return pauseGame();const d=DM[e.key];if(d&&!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0)){nextDir=d;e.preventDefault()}});
    let ts=null;canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
    canvas.addEventListener('touchend',e=>{if(!ts)return;const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y,ax=Math.abs(dx),ay=Math.abs(dy);if(ax<10&&ay<10){if(!running||!overlay.classList.contains('hidden'))return startGame();return pauseGame()}let d=ax>ay?(dx>0?DM.ArrowRight:DM.ArrowLeft):(dy>0?DM.ArrowDown:DM.ArrowUp);if(!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0))nextDir=d;ts=null},{passive:true});
    overlay.addEventListener('click',()=>{if(!running)return startGame();pauseGame()});
    resize();init();draw();msgEl.textContent='SNAKE';subEl.textContent='Press SPACE or tap to start';overlay.classList.remove('hidden');
  </script>
</body>
</html>
